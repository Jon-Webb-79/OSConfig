# ================================================================================
# tmux Configuration
# ================================================================================
#
# Description:
#   This file defines the primary configuration for tmux, including terminal
#   behavior, key bindings, pane and window management, clipboard integration,
#   and plugin support.
#
#   The configuration is designed to provide:
#     - A modern, efficient terminal multiplexing workflow
#     - Consistent navigation between tmux panes and Vim/Neovim splits
#     - Vi-style copy mode and system clipboard integration
#     - Improved usability through custom key bindings and sensible defaults
#     - Optional statusline enhancements via Powerline and TPM plugins
#
#   The configuration includes:
#     - General tmux behavior and terminal settings
#     - Prefix remapping and navigation shortcuts
#     - Smart pane switching with Vim-aware behavior
#     - Clipboard-aware copy mode for Wayland and X11 environments
#     - Plugin loading and plugin-specific options
#
#   Design goals:
#     - Productivity-focused (optimized for development workflows)
#     - Portable (supports multiple Linux clipboard/tooling setups)
#     - Modular (clear organization by functional area)
#     - Maintainable (readable sections and documented behavior)
#
# Usage:
#   Place this file at:
#
#       ~/.tmux.conf
#
#   Then reload from within tmux with:
#
#       Prefix + r
#
#   or from a shell with:
#
#       tmux source-file ~/.tmux.conf
#
# Dependencies (optional):
#     - powerline
#     - wl-copy   (Wayland clipboard support)
#     - xclip     (X11 clipboard support)
#     - TPM       (tmux plugin manager)
#     - tree      (used by tmux-sidebar)
#
# Source Metadata:
#   Author:    Jonathan A. Webb
#   Created:   January 5, 2021
#   Updated:   March 26, 2026
#   Version:   2.0
#
# ================================================================================
# ================================================================================ 

# ------------------------------------------------------------------------------
# General settings
# ------------------------------------------------------------------------------

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1

# Use modern tmux terminfo when available
set -g default-terminal "tmux-256color"

# True-color support
set -sa terminal-features ',*:RGB'
set -as terminal-overrides ',*:Tc'

set -g history-limit 20000
set -g buffer-limit 20

# Determines the time spent waiting after a command in ms
set -sg escape-time 0
set -g display-time 1500

# Allows infinite time between prefix keys and command
set -g remain-on-exit off
set -g repeat-time 300
set -g aggressive-resize on
set -g renumber-windows on

# Set parent terminal title to reflect current window in tmux
set -g set-titles on
set -g set-titles-string "#I:#W"

# Use the system clipboard when supported
set -s set-clipboard on

# Preserve current working directory when splitting panes
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Enable Powerline status if installed
if-shell '[ -r /usr/share/powerline/bindings/tmux/powerline.conf ]' \
    'source /usr/share/powerline/bindings/tmux/powerline.conf'

# ===============================================================================
# ===============================================================================
# Key bindings

# Create Control-A as the preferred prefix binding
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ------------------------------------------------------------------------------
# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
# ------------------------------------------------------------------------------

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Last-pane switching with Ctrl-\
if-shell '[ "$(tmux display-message -p "#{version}" | awk -F. '"'"'{ if ($1 < 3) print 1; else print 0 }'"'"')" = 1 ]' \
    "bind-key -n C-\\\\ if-shell \"$is_vim\" 'send-keys C-\\\\' 'select-pane -l'"

if-shell '[ "$(tmux display-message -p "#{version}" | awk -F. '"'"'{ if ($1 >= 3) print 1; else print 0 }'"'"')" = 1 ]' \
    "bind-key -n C-\\\\ if-shell \"$is_vim\" 'send-keys C-\\\\' 'select-pane -l'"

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# Press Alt-Enter to zoom pane
bind -n M-Enter resize-pane -Z

# Reload .tmux.conf from tmux
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# ===============================================================================
# ===============================================================================
# Copy mode and clipboard integration

setw -g mode-keys vi

# Start selection with v
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy behavior depends on the clipboard tool available on the host.
if-shell 'command -v wl-copy >/dev/null 2>&1' {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
} {
    if-shell 'command -v xclip >/dev/null 2>&1' {
        bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
        bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
        bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    } {
        bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
        bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
        bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
    }
}

# ===============================================================================
# ===============================================================================
# Plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'

# Plugin properties
set -g @sidebar-tree 't'
set -g @sidebar-tree-focus 'T'
set -g @sidebar-tree-command 'tree -C'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
# ================================================================================
# ================================================================================
# eof

